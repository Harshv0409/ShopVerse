<!-- Register Form with Reactive Forms validation -->
<div class="register-container">
  <div class="register-card">
    <h2>Create Account</h2>

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()">

      <!-- Name field -->
      <div class="form-group">
        <label>Name</label>
        <input type="text" formControlName="name" placeholder="Enter your name" />
        <div class="error" *ngIf="name?.invalid && name?.touched">
          <span *ngIf="name?.errors?.['required']">Name is required</span>
          <span *ngIf="name?.errors?.['minlength']">Minimum 3 characters required</span>
        </div>
      </div>

      <!-- Email field -->
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="Enter your email" />
        <div class="error" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required']">Email is required</span>
          <span *ngIf="email?.errors?.['email']">Enter a valid email address</span>
        </div>
      </div>

      <!-- Password field -->
      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Enter your password" />
        <div class="error" *ngIf="password?.invalid && password?.touched">
          <span *ngIf="password?.errors?.['required']">Password is required</span>
          <span *ngIf="password?.errors?.['minlength']">Minimum 6 characters required</span>
        </div>
      </div>

      <!-- Backend error -->
      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" [disabled]="registerForm.invalid">Register</button>

    </form>

    <p class="switch">Already have an account? <a routerLink="/auth/login">Login</a></p>
  </div>
</div>
